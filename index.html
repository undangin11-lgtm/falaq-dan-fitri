<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNDANG.IN - Generator Tamu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:340px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.12);
text-align:center;
}

.logo{
width:100px;
margin-bottom:10px;
}

h2{
font-size:24px;
margin-bottom:20px;
}

input{
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
resize:none;
font-family:Arial,sans-serif;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111;
color:#fff;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#333;
}

#hasil{
margin-top:15px;
font-size:13px;
word-break:break-all;
color:#555;
}

small{
display:block;
margin-top:20px;
color:#999;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>UNDANG.IN</h2>

<textarea
id="nama"
rows="10"
placeholder="Masukkan 1 nama setiap baris

Contoh:
Bapak Ahmad
Ibu Siti
Bapak Budi & Keluarga
Saudara Andi"></textarea>

<button onclick="generate()">
Generate Link
</button>

<button onclick="copyLink()">
Copy Link
</button>

<div id="hasil"></div>

<small>Premium Digital Invitation</small>

</div>

<script>

function generate(){

let daftar=document.getElementById("nama").value.trim().split("\n");

let hasil="";

daftar.forEach(function(nama){

if(nama.trim()!=""){

hasil += "https://domainanda.vercel.app/?to=" +
encodeURIComponent(nama.trim()) +
"<br><br>";

}

});

document.getElementById("hasil").innerHTML=hasil;

}

</script>

</body>
</html>
